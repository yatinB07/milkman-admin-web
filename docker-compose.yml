services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: milkman_admin
    restart: unless-stopped
    working_dir: /app
    network_mode: host
    volumes:
      - .:/app
      - admin_node_modules:/app/node_modules
    command: >
      sh -lc "
        npm ci &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  admin_node_modules:
